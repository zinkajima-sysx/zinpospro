<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZinPOS Pro - Premium POS System</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
    <link rel="shortcut icon" href="assets/icons/icon.png">


    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Main Content Area -->
        <main id="main-content" class="main-content">
            <!-- Pages will be rendered here -->
            <div id="page-loader" class="loader-container">
                <div class="loader"></div>
            </div>
        </main>

        <!-- Navbar Pill Style -->
        <nav id="navbar" class="navbar-pill">
            <!-- JS will inject navbar items here -->
        </nav>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- App Config & State -->
    <script src="js/utils/hashPassword.js"></script>
    <script src="js/utils/formatRupiah.js"></script>
    <script src="js/utils/autocomplete.js"></script>
    <script src="js/utils/toast.js"></script>
    <script src="js/utils/pagination.js"></script>
    <script src="js/config/supabase.js"></script>
    <script src="js/config/appConfig.js"></script>
    <script src="js/state/appStore.js"></script>
    <script src="js/state/authStore.js"></script>
    <script src="js/state/cartStore.js"></script>

    <!-- API Layer -->
    <script src="js/api/users.js"></script>
    <script src="js/api/products.js"></script>
    <script src="js/api/menuAccess.js"></script>
    <script src="js/api/register.js"></script>
    <script src="js/api/categories.js"></script>
    <script src="js/api/customers.js"></script>
    <script src="js/api/suppliers.js"></script>
    <script src="js/api/payments.js"></script>
    <script src="js/api/sales.js"></script>
    <script src="js/api/sales_items.js"></script>
    <script src="js/api/expenses.js"></script>
    <script src="js/api/purchases.js"></script>
    <script src="js/api/receivables.js"></script>

    <!-- Components -->

    <script src="js/ui/components/navbar.js"></script>
    <script src="js/ui/components/productCard.js"></script>
    <script src="js/ui/components/cartItem.js"></script>

    <!-- Pages -->
    <script src="js/ui/pages/loginPage.js"></script>
    <script src="js/ui/pages/registerPage.js"></script>
    <script src="js/ui/pages/posPage.js"></script>

    <script src="js/ui/pages/debtPage.js"></script>
    <script src="js/ui/pages/reportPage.js"></script>
    <script src="js/ui/pages/expensePage.js"></script>
    <script src="js/ui/pages/purchasePage.js"></script>

    <script src="js/ui/pages/settingsPage.js"></script>

    <!-- App Initialization -->
    <script src="js/ui/app.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW Registered', reg))
                    .catch(err => console.error('SW Registration Failed', err));
            });
        }
    </script>
</body>
</html>
